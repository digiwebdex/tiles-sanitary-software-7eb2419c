# =============================================================================
#  TilesERP — Backend API
#  Domain   : api.sanitileserp.com
#  Upstream : PM2 Node process on 127.0.0.1:3023   (this project only)
#  Isolated config — does NOT touch other VPS projects.
# =============================================================================

# Define an isolated upstream so we never collide with other projects
upstream tileserp_api {
    server 127.0.0.1:3023;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.sanitileserp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.sanitileserp.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.sanitileserp.com;

    ssl_certificate     /etc/letsencrypt/live/api.sanitileserp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sanitileserp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # Allow large request bodies (CSV imports, file uploads, etc.)
    client_max_body_size 25M;

    # ── Reverse proxy → PM2 backend on 127.0.0.1:3003 ────────────────────────
    location / {
        proxy_pass         http://tileserp_api;
        proxy_http_version 1.1;

        # Standard forwarding headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # Websocket / upgrade support (safe even if unused)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Don't let nginx buffer streaming responses
        proxy_buffering off;
    }

    # Lightweight health endpoint (bypasses heavy logging)
    location = /api/health {
        access_log off;
        proxy_pass http://tileserp_api;
        proxy_set_header Host $host;
    }
}
