services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tileserp
      POSTGRES_USER: tileserp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_strong_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tileserp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tileserp:${DB_PASSWORD:-changeme_strong_password}@db:5432/tileserp
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_64_RANDOM_CHARS}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-CHANGE_ME_DIFFERENT_64_RANDOM_CHARS}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-https://yourdomain.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      BULKSMSBD_API_KEY: ${BULKSMSBD_API_KEY:-}
      BULKSMSBD_API_URL: ${BULKSMSBD_API_URL:-http://bulksmsbd.net/api/smsapi}
      BULKSMSBD_SENDER_ID: ${BULKSMSBD_SENDER_ID:-}
    ports:
      - "127.0.0.1:4000:4000"

  # ── Frontend (React/Vite build served by Nginx) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api

  # ── SSL certificate management ──
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
